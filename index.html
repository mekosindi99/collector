<html lang="ar" dir="rtl" class="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sonbola (POS) </title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>

tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Cairo','sans-serif']}}}}

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;min-height:100vh;font-size:13px;line-height:1.5}

/* ── Scrollbar متقدم ─────────────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(16,185,129,.25);border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:rgba(16,185,129,.45)}

/* ── Animations ──────────────────────────── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 8px rgba(16,185,129,.3)}50%{box-shadow:0 0 20px rgba(16,185,129,.6)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.spin{animation:spin .8s linear infinite}
.fi{animation:fi .25s cubic-bezier(.22,.68,0,1.2)}

/* ── حجم الخط حسب المواصفات ─────────────── */
.text-xs{font-size:10px!important}
.text-sm{font-size:11px!important}
.text-base{font-size:14px!important}
.text-lg{font-size:16px!important}
.text-xl{font-size:18px!important}

/* ══ متغيرات الألوان والتنسيقات من الشيت ══ */
/* قسم لوحة التحكم   */ :root{--clr-dashboard:#38bdf8}
/* قسم المبيعات      */ :root{--clr-orders:#34d399}
/* قسم المنتجات      */ :root{--clr-products:#a78bfa}
/* قسم المصروفات     */ :root{--clr-expenses:#fb923c}
/* قسم التكسي        */ :root{--clr-taxi:#fbbf24}
/* قسم الشحن         */ :root{--clr-shipment:#22d3ee}
/* قسم التقارير      */ :root{--clr-reports:#f472b6}
/* قسم الإعدادات     */ :root{--clr-settings:#94a3b8}
/* قسم النسخ الاحتياطي*/:root{--clr-backup:#10b981}
/* زر الخروج         */ :root{--clr-logout:#f87171}
/* زر تحميل التطبيق  */ :root{--clr-pwa:#7c3aed}
/* زر التعديل        */ :root{--clr-edit:#60a5fa}
/* زر الحذف          */ :root{--clr-delete:#f87171}
/* زر Excel          */ :root{--clr-excel:#34d399}

/* ── Dark theme vars (مطابق للشيت) ─────── */
.dark{
  --bg:#0f172a;--fg:#ffffff;
  --card:rgba(255,255,255,.05);
  --card-hover:rgba(255,255,255,.08);
  --border:rgba(255,255,255,.08);
  --border-strong:rgba(255,255,255,.14);
  --muted:rgba(255,255,255,.04);--muted-fg:#64748b;
  --primary:#10b981;--primary-dark:#059669;--primary-fg:#fff;
  --sidebar-start:#0b1120;--sidebar-mid:#0d1f18;
  --input:rgba(255,255,255,.12);
  --chart1:#10b981;--chart2:#fb923c;--chart3:#38bdf8;--chart4:#a78bfa;--chart5:#f87171;
  /* الشيت: rounded-2xl=16px cards, rounded-xl=12px icons, rounded-2xl=16px buttons */
  --radius-card:16px;--radius-icon:12px;--radius-btn:16px;
  --transition:all 200ms cubic-bezier(.4,0,.2,1);
  --shadow-sm:0 2px 8px rgba(0,0,0,.3);
  --shadow-md:0 4px 20px rgba(0,0,0,.4);
  --shadow-lg:0 8px 40px rgba(0,0,0,.5);
}
.light{
  --bg:#f8fafc;--fg:#0f172a;
  --card:#ffffff;
  --card-hover:#f1f5f9;
  --border:#e2e8f0;
  --border-strong:#cbd5e1;
  --muted:#f1f5f9;--muted-fg:#64748b;
  --primary:#10b981;--primary-dark:#059669;--primary-fg:#fff;
  --sidebar-start:#0b1120;--sidebar-mid:#0d1f18;
  --input:#e2e8f0;
  --chart1:#10b981;--chart2:#fb923c;--chart3:#38bdf8;--chart4:#a78bfa;--chart5:#f87171;
  --radius-card:16px;--radius-icon:12px;--radius-btn:16px;
  --transition:all 200ms cubic-bezier(.4,0,.2,1);
  --shadow-sm:0 2px 8px rgba(0,0,0,.08);
  --shadow-md:0 4px 20px rgba(0,0,0,.12);
  --shadow-lg:0 8px 40px rgba(0,0,0,.16);
}
body{background:var(--bg);color:var(--fg)}

/* ── البطاقات — rounded-2xl = 16px (من الشيت) ─ */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius-card);
  padding:16px;
  transition:var(--transition);
  box-shadow:var(--shadow-sm);
}
.card:hover{border-color:var(--border-strong);box-shadow:var(--shadow-md)}

/* ── الحقول ──────────────────────────────── */
.inp{
  width:100%;padding:9px 13px;
  border-radius:var(--radius-btn);
  border:1.5px solid var(--input);background:var(--card);
  color:var(--fg);font-size:13px;font-family:'Cairo',sans-serif;
  outline:none;box-sizing:border-box;
  transition:border-color 200ms ease,box-shadow 200ms ease,background 200ms ease;
}
.inp:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(16,185,129,.15),0 2px 8px rgba(16,185,129,.1);
  background:var(--card);
}
.dark .inp{background:rgba(255,255,255,.06)}
.dark .inp:focus{background:rgba(16,185,129,.04)}

/* ── الأزرار الرئيسية — rounded-2xl (من الشيت) ─ */
.btn{
  padding:8px 18px;
  border-radius:var(--radius-btn);
  border:none;
  background:linear-gradient(135deg,#10b981 0%,#059669 100%);
  color:#fff;
  font-size:13px;font-family:'Cairo',sans-serif;font-weight:700;
  cursor:pointer;display:inline-flex;align-items:center;gap:7px;
  box-shadow:0 2px 12px rgba(16,185,129,.35),0 1px 3px rgba(0,0,0,.2);
  transition:var(--transition);
  position:relative;overflow:hidden;
  letter-spacing:.2px;
}
.btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
  opacity:0;transition:opacity 200ms ease;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(16,185,129,.5),0 2px 8px rgba(0,0,0,.25)}
.btn:hover::before{opacity:1}
.btn:active{transform:translateY(0);box-shadow:0 2px 8px rgba(16,185,129,.3)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}

/* ── أزرار الحدود — btn-out ──────────────── */
.btn-out{
  padding:8px 14px;
  border-radius:var(--radius-btn);
  border:1.5px solid var(--border-strong);
  background:transparent;
  color:var(--fg);font-size:13px;font-family:'Cairo',sans-serif;font-weight:600;
  cursor:pointer;display:inline-flex;align-items:center;gap:7px;
  transition:var(--transition);
}
.btn-out:hover{background:var(--muted);border-color:var(--primary);color:var(--primary)}

/* ── أزرار الأيقونة الشفافة ──────────────── */
.btn-gh{
  padding:6px 9px;
  border-radius:10px;
  border:none;
  background:transparent;
  color:var(--muted-fg);
  font-size:13px;font-family:'Cairo',sans-serif;
  cursor:pointer;display:inline-flex;align-items:center;gap:5px;
  transition:var(--transition);
}
.btn-gh:hover{background:var(--muted);transform:scale(1.05)}
.btn-gh:active{transform:scale(.97)}

/* ── أزرار التعديل والحذف (من الشيت) ──────── */
.btn-edit{
  padding:6px 10px;border-radius:10px;border:1px solid rgba(96,165,250,.25);
  background:rgba(96,165,250,.1);color:#60a5fa;
  cursor:pointer;display:inline-flex;align-items:center;gap:5px;
  font-family:'Cairo',sans-serif;font-size:12px;
  transition:var(--transition);
}
.btn-edit:hover{background:rgba(96,165,250,.2);border-color:rgba(96,165,250,.5);transform:scale(1.05)}

.btn-del{
  padding:6px 10px;border-radius:10px;border:1px solid rgba(248,113,113,.25);
  background:rgba(248,113,113,.1);color:#f87171;
  cursor:pointer;display:inline-flex;align-items:center;gap:5px;
  font-family:'Cairo',sans-serif;font-size:12px;
  transition:var(--transition);
}
.btn-del:hover{background:rgba(248,113,113,.2);border-color:rgba(248,113,113,.5);transform:scale(1.05)}

/* ── الجداول — font 14px (من الشيت) ─────── */
.tbl{width:100%;border-collapse:collapse;font-size:14px}
.tbl th{
  padding:10px 12px;text-align:right;font-weight:700;
  font-size:11px;color:var(--muted-fg);letter-spacing:.5px;text-transform:uppercase;
  background:var(--muted);border-bottom:1.5px solid var(--border);
}
.tbl th:first-child{border-radius:var(--radius-icon) 0 0 0}
.tbl th:last-child{border-radius:0 var(--radius-icon) 0 0}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--fg);vertical-align:middle;overflow:hidden}
.tbl td img{width:40px!important;height:40px!important;max-width:40px!important;max-height:40px!important;object-fit:cover;border-radius:8px;display:block}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{transition:background 150ms ease}
.tbl tbody tr:hover td{background:rgba(16,185,129,.04)}

/* ── شريط التنقل (من الشيت) ──────────────── */
.nav-btn{
  width:100%;display:flex;align-items:center;gap:11px;
  padding:9px 11px;
  border-radius:var(--radius-icon);
  border:1px solid transparent;background:transparent;
  cursor:pointer;text-align:right;font-size:13.5px;
  font-family:'Cairo',sans-serif;font-weight:600;
  color:var(--muted-fg);transition:var(--transition);margin-bottom:3px;
  position:relative;overflow:hidden;
}
.nav-btn::after{
  content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);
  width:3px;height:0;border-radius:2px;
  transition:height 200ms ease,background 200ms ease;
}
.nav-btn.active-nav::after{height:70%;background:currentColor}

/* ── Overlay & Modal ─────────────────────── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  z-index:99;display:flex;align-items:center;justify-content:center;padding:16px;
}
.modal{
  background:#18263a;
  border:1px solid var(--border-strong);
  border-radius:var(--radius-card);
  box-shadow:0 24px 80px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04);
  width:100%;max-width:560px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;
  animation:fi .25s cubic-bezier(.22,.68,0,1.2);
}
.light .modal{background:#ffffff;box-shadow:0 24px 80px rgba(0,0,0,.2)}
.dark .modal .inp{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12)}
.dark .modal select.inp{background:#1e3048;color:#fff}
.dark .modal-h{background:#18263a}
.modal-h{
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(255,255,255,.02);
}
.modal-b{padding:18px;overflow-y:auto;flex:1;background:inherit;display:flex;flex-direction:column;gap:12px}

/* ── Badges (من الشيت) ───────────────────── */
.badge{
  display:inline-flex;align-items:center;
  padding:3px 10px;
  border-radius:9999px;
  font-size:11px;font-weight:700;
  letter-spacing:.3px;
}

/* ── Toast ───────────────────────────────── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:rgba(15,23,42,.95);
  backdrop-filter:blur(12px);
  border:1px solid rgba(16,185,129,.25);
  border-radius:14px;padding:13px 22px;
  font-size:14px;color:#fff;z-index:999;
  box-shadow:0 12px 40px rgba(0,0,0,.4),0 0 0 1px rgba(16,185,129,.1);
  min-width:220px;text-align:center;
  animation:toastIn .3s cubic-bezier(.22,.68,0,1.2);
  font-family:'Cairo',sans-serif;font-weight:700;
}
.light .toast{background:rgba(255,255,255,.97);color:#0f172a;border-color:rgba(16,185,129,.3)}

/* ── Mobile header ───────────────────────── */
.mob-hdr{
  display:none;background:linear-gradient(90deg,#0b1120,#0d1f18);
  border-bottom:1px solid rgba(255,255,255,.07);
  padding:10px 16px;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:40;
  box-shadow:0 2px 12px rgba(0,0,0,.3);
}
@media(max-width:768px){.mob-hdr{display:flex!important}.dsk-sb{display:none!important}.mc{padding:12px!important}}
@media print{.np{display:none!important}body{background:#fff!important;color:#000!important}.card{background:#fff!important;border:1px solid #ccc!important}}

/* ── Product cards ────────────────────────── */
.prod-card{
  border-radius:12px;
  border:2px solid var(--border);
  background:var(--card);padding:6px 4px;cursor:pointer;
  transition:var(--transition);display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.prod-card.sel{
  border-color:var(--primary);
  background:rgba(16,185,129,.06);
  box-shadow:0 0 20px rgba(16,185,129,.25),0 4px 12px rgba(0,0,0,.2);
}
.prod-card:hover:not(.sel):not(.oos){
  border-color:rgba(16,185,129,.5);
  box-shadow:0 0 14px rgba(16,185,129,.2),0 4px 12px rgba(0,0,0,.2);
  transform:translateY(-1px);
}
.prod-card.oos{opacity:.55;cursor:not-allowed;border-color:rgba(248,113,113,.3)}

/* ── KPI cards ────────────────────────────── */
.kpi{
  border-radius:16px;padding:16px 18px;
  color:#fff;position:relative;overflow:hidden;
  transition:var(--transition);
  box-shadow:0 4px 20px rgba(0,0,0,.25);
}
.kpi::before{
  content:'';position:absolute;top:-40%;right:-20%;
  width:160%;height:160%;
  background:radial-gradient(circle,rgba(255,255,255,.12) 0%,transparent 65%);
  pointer-events:none;
}
.kpi:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.35);filter:brightness(1.06)}

/* ── Icon box مع glow (من الشيت) ──────────── */
.icon-box{
  display:flex;align-items:center;justify-content:center;
  /* rounded-xl = 12px حسب الشيت */
  border-radius:var(--radius-icon);
  flex-shrink:0;
  transition:var(--transition);
}
.nav-btn:hover .icon-box{transform:scale(1.1)}

/* ── Stat card ───────────────────────────── */
.stat-card-wrap{
  transition:var(--transition);
}
.stat-card-wrap:hover{transform:translateY(-2px)}

/* ── Section headers ─────────────────────── */
.page-header{
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:10px;
}
.page-title{
  font-size:22px;font-weight:900;
  background:linear-gradient(135deg,var(--fg),rgba(255,255,255,.7));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.dark .page-title{background:linear-gradient(135deg,#fff,rgba(255,255,255,.65));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.light .page-title{background:linear-gradient(135deg,#0f172a,#334155);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ── Sync indicator ──────────────────────── */
.sync-bar{
  padding:5px 14px;
  display:flex;align-items:center;gap:8px;
  flex-shrink:0;border-radius:0;
  transition:background 300ms ease;
}
.sdot{
  width:7px;height:7px;border-radius:50%;flex-shrink:0;
  box-shadow:0 0 8px currentColor;
}

/* ── Improved scrollbar in nav ───────────── */
nav::-webkit-scrollbar{width:3px}
nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

/* ── تحسين الصور ──────────────────────────── */
img{max-width:100%;height:auto;display:block}
.card img{max-height:300px;object-fit:contain;margin:10px 0}
.tbl td img{width:40px!important;height:40px!important;max-width:40px!important;max-height:40px!important}

/* ── Glow pulse for active nav ───────────── */
@keyframes navGlow{0%,100%{opacity:.6}50%{opacity:1}}
</style>
</head>

<div id="root"></div>
<script>
// ── معالج الأخطاء العام ───────────────────
window.onerror = function(msg, src, line, col, err) {
  console.error('JS Error:', msg, src, line);
};
// ══════════════════════════════════════════════════
// ██████╗  ██████╗  ██████╗
// ██╔══██╗██╔═══██╗██╔════╝
// ██████╔╝██║   ██║██║
// ██╔═══╝ ██║   ██║██║
// ██║     ╚██████╔╝╚██████╗
// ╚═╝      ╚═════╝  ╚═════╝  FIREBASE EDITION
// ══════════════════════════════════════════════════

// ══════════════════════════════════════════════════
// FIREBASE + localStorage HYBRID
// Firebase للبيانات الحقيقية — localStorage للكاش المحلي
// ══════════════════════════════════════════════════

const FB_CONFIG = {
  apiKey:            "AIzaSyBqf7nAzt9lSgI79vzSDvLvN5pjMOfUFXw",
  authDomain:        "sonbola-pos.firebaseapp.com",
  projectId:         "sonbola-pos",
  storageBucket:     "sonbola-pos.firebasestorage.app",
  messagingSenderId: "626312367633",
  appId:             "1:626312367633:web:cd3604887607e15814abb0"
};

// ── localStorage للكاش ─────────────────────────
const LS_KEY = 'snb_db_v2';
const lsLoad = () => { try { return JSON.parse(localStorage.getItem(LS_KEY)||'{}'); } catch(e) { return {}; } };
const lsSave = d => { try { localStorage.setItem(LS_KEY, JSON.stringify(d)); } catch(e) {} };
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);

// ── Firebase init ──────────────────────────────
let fstore = null;
const initFirebase = async () => {
  try {
    if(!window.firebase) return false;
    if(!firebase.apps.length) firebase.initializeApp(FB_CONFIG);
    fstore = firebase.firestore();
    return true;
  } catch(e) { console.error('Firebase init:', e); return false; }
};

// ── CACHE ──────────────────────────────────────
const CACHE_KEY = 'fb_cache_v1';
const saveCache = data => { try { localStorage.setItem(CACHE_KEY, JSON.stringify({ts:Date.now(),data})); } catch(e){} };
const loadCache = () => { try { const c=localStorage.getItem(CACHE_KEY); return c?JSON.parse(c):null; } catch(e){return null;} };

// ── db layer: Firebase أولاً، localStorage احتياطي ─
const db = {
  list: async (col) => {
    if(fstore){
      try{
        const snap = await fstore.collection(col).get();
        const docs = snap.docs.map(d=>({id:d.id,...d.data()}));
        docs.sort((a,b)=>{
          const ta=a.created_at?.toMillis?.()||a.created_at?.seconds*1000||a._ts||0;
          const tb=b.created_at?.toMillis?.()||b.created_at?.seconds*1000||b._ts||0;
          return ta-tb;
        });
        return docs;
      }catch(e){console.warn('Firebase list failed, using cache:',e.message);}
    }
    const store=lsLoad(); return (store[col]||[]);
  },
  add: async (col, data) => {
    const payload = Array.isArray(data)?data:[data];
    const results = [];
    for(const item of payload){
      if(fstore){
        try{
          const ref = await fstore.collection(col).add({...item, created_at: firebase.firestore.FieldValue.serverTimestamp()});
          const rec = {id:ref.id,...item};
          results.push(rec); continue;
        }catch(e){console.warn('Firebase add failed:',e.message);}
      }
      // fallback localStorage
      const store=lsLoad(); if(!store[col])store[col]=[];
      const rec={...item,id:item.id||genId(),_ts:Date.now()};
      store[col].push(rec); lsSave(store); results.push(rec);
    }
    return Array.isArray(data)?results:results[0];
  },
  set: async (col, id, data) => {
    if(fstore){
      try{
        await fstore.collection(col).doc(String(id)).update(data);
        return {id,...data};
      }catch(e){console.warn('Firebase set failed:',e.message);}
    }
    const store=lsLoad(); if(!store[col])store[col]=[];
    const idx=store[col].findIndex(r=>String(r.id)===String(id));
    const rec={...(store[col][idx]||{}),...data,id:String(id),_ts:Date.now()};
    if(idx>=0)store[col][idx]=rec; else store[col].push(rec);
    lsSave(store); return rec;
  },
  del: async (col, id) => {
    if(fstore){
      try{ await fstore.collection(col).doc(String(id)).delete(); return null; }
      catch(e){console.warn('Firebase del failed:',e.message);}
    }
    const store=lsLoad();
    if(store[col])store[col]=store[col].filter(r=>String(r.id)!==String(id));
    lsSave(store); return null;
  },
  ups: async (col, data) => {
    const payload=Array.isArray(data)?data:[data];
    const results=[];
    for(const item of payload){
      if(item.id)results.push(await db.set(col,item.id,item));
      else results.push(await db.add(col,item));
    }
    return Array.isArray(data)?results:results[0];
  },
};

const loadAll=async()=>{
  setState({loading:true,dbErr:null});
  // timeout أمان — لا تبقى الشاشة سوداء أكثر من 20 ثانية
  const safetyTimer=setTimeout(()=>{
    if(S.loading){
      console.warn('loadAll timeout — forcing loading:false');
      setState({loading:false,dbErr:'انتهت مهلة الاتصال — تحقق من الإنترنت وأعد المحاولة'});
    }
  },20000);

  // تهيئة Firebase إذا لم تكن جاهزة
  if(!fstore){
    const ok = await initFirebase();
    if(!ok){ clearTimeout(safetyTimer); setState({dbErr:'فشل الاتصال — تحقق من الإنترنت',loading:false}); return; }
  }

  // عرض الكاش فوراً إن وجد
  const cached=loadCache();
  if(cached&&(Date.now()-cached.ts)<600000){
    const d=cached.data;
    setState({products:d.products||[],orders:d.orders||[],expenses:d.expenses||[],
      taxis:d.taxis||[],shipments:d.shipments||[],
      settings:d.settings||JSON.parse(JSON.stringify(DEF)),loading:false,dbErr:null});
  }

  try{
    const safe=async(fn)=>{try{return await fn();}catch(e){console.warn(e.message);return[];}};
    const[p,o,e,tx,sh,cats,expCats,provs,appSt]=await Promise.all([
      safe(()=>db.list('products')),
      safe(()=>db.list('orders')),
      safe(()=>db.list('expenses')),
      safe(()=>db.list('taxi_rides')),
      safe(()=>db.list('shipments')),
      safe(()=>db.list('categories')),
      safe(()=>db.list('expense_categories')),
      safe(()=>db.list('provinces')),
      safe(()=>db.list('app_settings')),
    ]);
    const catNames=(cats||[]).map(c=>c.name);
    const expCatNames=(expCats||[]).map(c=>c.name);
    const appStMap={};(appSt||[]).forEach(r=>{try{appStMap[r.key]=typeof r.value==='string'?JSON.parse(r.value):r.value;}catch(e){appStMap[r.key]=r.value;}});
    const zonesMap={};
    (provs||[]).forEach(pv=>{
      const region=pv.region||'iraq';
      if(!zonesMap[region])zonesMap[region]={name:region==='zakho'?'زاخو':region==='kurdistan'?'مناطق كردستان':region==='family'?'الأهل والبيت':'المحافظات العراقية',price:pv.shipping_price||5000,region,cities:[]};
      zonesMap[region].cities.push(pv.name);
    });
    const delivery_zones=Object.values(zonesMap);
    const settings={
      ...JSON.parse(JSON.stringify(DEF)),
      categories:catNames.length?catNames:DEF.categories,
      expense_categories:expCatNames.length?expCatNames:DEF.expense_categories,
      delivery_zones:delivery_zones.length?delivery_zones:DEF.delivery_zones,
      next_order_id:appStMap['next_order_id']||DEF.next_order_id,
    };
    const orders=(o||[]).map(x=>({...x,items:x.items||[]})).reverse();
    saveCache({products:p||[],orders,expenses:e||[],taxis:tx||[],shipments:sh||[],settings});
    clearTimeout(safetyTimer);
    setState({products:p||[],settings,orders,expenses:e||[],taxis:tx||[],shipments:sh||[],loading:false,dbErr:null});
  }catch(err){
    console.error('loadAll error:',err);
    clearTimeout(safetyTimer);
    if(cached)setState({loading:false,syncSt:'error'});
    else setState({dbErr:err.message,loading:false});
  }
};

const el=(tag,a,...kids)=>{
  const e=document.createElement(tag);
  if(a)Object.entries(a).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')e.className=v;
    else if(k==='innerHTML')e.innerHTML=v;
    else if(k==='disabled'){v?e.setAttribute('disabled',''):e.removeAttribute('disabled');}
    else e.setAttribute(k,v);
  });
  kids.flat(Infinity).forEach(k=>{if(k==null||k===false)return;e.appendChild(typeof k==='string'||typeof k==='number'?document.createTextNode(String(k)):k);});
  return e;
};

// ── LOGIN ─────────────────────────────────
const buildLogin=()=>{
  let id='',pw='',showP=false;

  // Inject login styles
  if(!document.getElementById('login-styles')){
    const st=document.createElement('style');st.id='login-styles';
    st.textContent=`
      @keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:.7}50%{transform:translateY(-30px) scale(1.08);opacity:.4}100%{transform:translateY(0) scale(1);opacity:.7}}
      @keyframes loginFadeIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
      .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:radial-gradient(ellipse at 30% 20%,#0d3d2a 0%,#071a10 40%,#050d08 100%);position:relative;overflow:hidden}
      .login-bubble{position:absolute;border-radius:50%;filter:blur(60px);pointer-events:none;animation:floatUp 8s ease-in-out infinite}
      .login-card{position:relative;width:100%;max-width:370px;animation:loginFadeIn .5s ease}
      .login-logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:28px}
      .login-logo-icon{width:72px;height:72px;border-radius:20px;background:linear-gradient(145deg,#1db954,#0d8a3a);box-shadow:0 8px 32px rgba(29,185,84,.45);display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:14px}
      .login-title{font-size:36px;font-weight:900;color:#fff;letter-spacing:-1px;margin-bottom:4px;font-family:'Cairo',sans-serif}
      .login-sub{font-size:13px;color:rgba(29,185,84,.75);font-family:'Cairo',sans-serif}
      .login-box{background:rgba(255,255,255,.055);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,.09);border-radius:24px;padding:28px 26px}
      .login-box-title{font-size:17px;font-weight:800;color:#fff;margin-bottom:22px;text-align:right;font-family:'Cairo',sans-serif}
      .login-lbl{display:block;font-size:12px;font-weight:700;color:rgba(255,255,255,.5);margin-bottom:7px;text-align:right;font-family:'Cairo',sans-serif}
      .login-inp{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.07);color:#fff;font-size:14px;font-family:'Cairo',sans-serif;outline:none;box-sizing:border-box;transition:border-color .2s,background .2s;text-align:right;direction:rtl}
      .login-inp:focus{border-color:rgba(29,185,84,.6);background:rgba(29,185,84,.06)}
      .login-inp::placeholder{color:rgba(255,255,255,.28)}
      .login-pw-wrap{position:relative}
      .login-eye{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.35);font-size:15px;cursor:pointer;padding:0;line-height:1}
      .login-err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);border-radius:10px;padding:10px 14px;color:#f87171;font-size:13px;text-align:center;margin-bottom:14px;font-family:'Cairo',sans-serif;display:none}
      .login-btn{width:100%;padding:13px;border-radius:13px;border:none;background:linear-gradient(135deg,#1db954,#0d8a3a);color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:'Cairo',sans-serif;box-shadow:0 4px 24px rgba(29,185,84,.4);transition:opacity .2s,transform .15s;margin-top:4px}
      .login-btn:hover{opacity:.92;transform:translateY(-1px)}
      .login-btn:active{transform:translateY(0)}
      .login-hint{text-align:center;font-size:11px;color:rgba(255,255,255,.2);margin-top:16px;font-family:'Cairo',sans-serif}
    `;
    document.head.appendChild(st);
  }

  const w=el('div',{className:'login-wrap'});

  // Animated bubbles
  [{top:'5%',right:'10%',w:280,h:280,color:'rgba(29,185,84,.13)',delay:'0s'},{bottom:'10%',left:'5%',w:220,h:220,color:'rgba(16,185,129,.1)',delay:'3s'},{top:'50%',right:'50%',w:160,h:160,color:'rgba(5,150,105,.08)',delay:'5s'}].forEach(b=>{
    const pos={};
    if(b.top)pos.top=b.top; if(b.bottom)pos.bottom=b.bottom;
    if(b.left)pos.left=b.left; if(b.right)pos.right=b.right;
    const d=el('div',{className:'login-bubble',style:{width:b.w+'px',height:b.h+'px',background:b.color,animationDelay:b.delay,...pos}});
    w.appendChild(d);
  });

  const card=el('div',{className:'login-card'});

// IMAGE COMPRESSOR
// ════════════════════════════════════════
const compressImage=(file,maxW=800,maxH=800,quality=0.75)=>new Promise((resolve,reject)=>{
  const reader=new FileReader();
  reader.onerror=()=>reject(new Error('فشل قراءة الملف'));
  reader.onload=ev=>{
    const img=new Image();
    img.onerror=()=>reject(new Error('فشل تحميل الصورة'));
    img.onload=()=>{
      // احسب الأبعاد الجديدة مع الحفاظ على النسبة
      let w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      if(h>maxH){w=Math.round(w*maxH/h);h=maxH;}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      // اضغط كـ JPEG
      const compressed=canvas.toDataURL('image/jpeg',quality);
      // حساب الأحجام للعرض
      const origKB=Math.round(file.size/1024);
      const compKB=Math.round((compressed.length*3/4)/1024);
      resolve({dataUrl:compressed,origKB,compKB,w,h});
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
});

const buildProducts=()=>{
  let srch='',am=null;

    el('div',{style:{display:'flex',gap:8}},
      el('button',{className:'btn-out np',style:{borderColor:'rgba(52,211,153,.35)',color:'#34d399',background:'rgba(52,211,153,.07)'},onClick:async()=>{
        // ── دالة مساعدة: تحويل dataURL أو URL إلى ArrayBuffer ──
        const toArrayBuffer = async (src) => {
          if(!src) return null;
          try {
            if(src.startsWith('data:')) {
              // base64 dataURL
              const base64 = src.split(',')[1];
              const bin = atob(base64);
              const buf = new Uint8Array(bin.length);
              for(let i=0;i<bin.length;i++) buf[i]=bin.charCodeAt(i);
              return buf.buffer;
            } else {
              // URL خارجي
              const res = await fetch(src);
              return await res.arrayBuffer();
            }
          } catch(e) { return null; }
        };

        // ── اكتشاف نوع الصورة ──
        const imgExt = (src) => {
          if(!src) return 'png';
          if(src.startsWith('data:image/jpeg')||src.startsWith('data:image/jpg')) return 'jpeg';
          if(src.startsWith('data:image/gif')) return 'gif';
          if(src.startsWith('data:image/webp')) return 'png'; // ExcelJS لا يدعم webp، نحوّله
          if(/\.jpe?g(\?|$)/i.test(src)) return 'jpeg';
          if(/\.gif(\?|$)/i.test(src)) return 'gif';
          return 'png';
        };

        // ── تحويل webp إلى png عبر canvas ──
        const webpToPng = (src) => new Promise(resolve => {
          try {
            const img = new Image();
            img.crossOrigin='anonymous';
            img.onload = () => {
              const c = document.createElement('canvas');
              c.width=img.width; c.height=img.height;
              c.getContext('2d').drawImage(img,0,0);
              resolve(c.toDataURL('image/png'));
            };
            img.onerror = () => resolve(null);
            img.src = src;
          } catch(e){ resolve(null); }
        });

        // ── إنشاء الـ Workbook ──
        const wb = new ExcelJS.Workbook();
        wb.creator = 'Sonbola POS';
        const ws = wb.addWorksheet('المنتجات', {views:[{rightToLeft:false}]});

        // ── تعريف الأعمدة ──
        ws.columns = [
          {key:'num',   width:6},
          {key:'img',   width:10}, // سيُعاد تعيينه ليتساوى مع ارتفاع الصف
          {key:'name',  width:22},
          
          {key:'sea',   width:12},
          {key:'buy',   width:14},
          {key:'sell',  width:14},
          {key:'stk',   width:10},
          {key:'prof',  width:14},
          {key:'date',  width:14},
        ];

        // ── رأس الجدول ──
        const hRow = ws.addRow(['#','الصورة','الاسم','الموسم','سعر الشراء','سعر البيع','المخزون','الربح','تاريخ الإضافة']);
        hRow.height = 28;
        const borderStyle = {style:'thin', color:{argb:'FFD1D5DB'}};
        const allBorders = {top:borderStyle,left:borderStyle,bottom:borderStyle,right:borderStyle};
        hRow.eachCell(cell=>{
          cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF1a5c35'}};

        const IMG_PX = 60; // حجم الصورة المربع بالبكسل
        const COL_IMG_PX = IMG_PX; // عرض عمود الصورة = حجم الصورة

        ws.getColumn(2).width = COL_IMG_W;

        // ── إضافة البيانات (تخطي المنتجات الفارغة) ──
        let rowIdx = 2;
        for(let i=0;i<S.products.length;i++){
          const p = S.products[i];
          // تخطي الصفوف الفارغة (بدون اسم ولا سعر)
          if(!p.name && !p.sell_price && !p.buy_price) continue;
          const profit = Number(p.sell_price||0)-Number(p.buy_price||0);
          const dateVal = (()=>{
            if(p.added_date) return p.added_date;
            if(p.created_at){
              if(p.created_at.toDate) return p.created_at.toDate().toISOString().split('T')[0];

        el('td',{style:{color:'var(--muted-fg)',fontSize:12}},(()=>{if(!p.created_at)return p.added_date||'—';if(typeof p.created_at==='string')return p.created_at.split('T')[0];if(p.created_at.toDate)return p.created_at.toDate().toISOString().split('T')[0];return p.added_date||'—';})()),

          el('button',{className:'btn-gh',style:{padding:'5px 8px',color:'#f87171'},onClick:async()=>{
            if(!confirm('حذف هذا المنتج؟'))return;
            await sync(async()=>{await db.del('products',p.id);S.products=S.products.filter(x=>x.id!==p.id);});
            rT();toast('✅ تم حذف المنتج');
          }},lucideIcon('Trash2',14,'#f87171'))
        ))

  };
  rT();

  // ── Modal إضافة / تعديل منتج ──
  const openF=(prod)=>{
    const ie=!!prod;
    let f={
      name:prod?.name||'',
      category:prod?.category||((S.settings.categories||[])[0]||'ملابس_أطفال'),
      season:prod?.season||'غير محدد',
      buy_price:prod?.buy_price||'',
      sell_price:prod?.sell_price||'',
      stock:prod?.stock??'',
      min_stock:prod?.min_stock??0,
      image:prod?.image||prod?.img||null
    };

    const body=el('div',{style:{display:'flex',flexDirection:'column',gap:14}});

    // ── قسم الصورة ──
    const imgLabel=el('p',{style:{fontSize:12,fontWeight:700,color:'var(--muted-fg)',marginBottom:8}},'صورة المنتج (اختياري)');
    body.appendChild(imgLabel);

    // منطقة رفع الصورة
    const dropZone=el('div',{style:{
      width:'100%',minHeight:110,borderRadius:12,
      border:'2px dashed rgba(255,255,255,.18)',
      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
      cursor:'pointer',background:'rgba(255,255,255,.03)',overflow:'hidden',position:'relative',
      transition:'border-color 200ms',gap:6
    }});
    const fi=el('input',{type:'file',accept:'image/jpeg,image/png,image/gif,image/webp',style:{display:'none'}});

    const renderDrop=()=>{
      dropZone.innerHTML='';
      dropZone.appendChild(fi);
      if(f.image){
        dropZone.appendChild(el('img',{src:f.image,style:{width:'100%',maxHeight:130,objectFit:'cover'}}));
      } else {
        const icon=el('div',{style:{fontSize:28,opacity:.5}},'⬆️');
        const t1=el('p',{style:{fontSize:13,color:'var(--muted-fg)',fontWeight:600}},'اضغط لرفع صورة');
        const t2=el('p',{style:{fontSize:11,color:'var(--muted-fg)',opacity:.7}},'أو اسحب الصورة وأفلتها هنا');
        const t3=el('p',{style:{fontSize:10,color:'var(--muted-fg)',opacity:.5}},'JPG, PNG, GIF, WebP');
        dropZone.appendChild(icon);dropZone.appendChild(t1);dropZone.appendChild(t2);dropZone.appendChild(t3);
      }
    };
    // شريط معلومات الضغط
    const sizeInfo=el('div',{style:{fontSize:11,color:'#10b981',textAlign:'center',minHeight:16,marginTop:2}});
    body.appendChild(sizeInfo);

    const handleImageFile=async(file)=>{
      if(!file||!file.type.startsWith('image/'))return;
      // عرض حالة التحميل
      sizeInfo.style.color='#fbbf24';
      sizeInfo.textContent='⏳ جاري ضغط الصورة...';
      try{
        const result=await compressImage(file,800,800,0.75);
        f.image=result.dataUrl;
        renderDrop();
        // عرض نتيجة الضغط
        const saved=Math.round((1-result.compKB/result.origKB)*100);
        sizeInfo.style.color='#10b981';
        sizeInfo.textContent=`✅ ${result.origKB} KB ← ${result.compKB} KB  (وفّرنا ${saved}%)  📐 ${result.w}×${result.h}`;
      }catch(err){
        sizeInfo.style.color='#f87171';
        sizeInfo.textContent='❌ فشل ضغط الصورة: '+err.message;
      }
    };

    renderDrop();
    dropZone.onclick=()=>fi.click();
    dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.style.borderColor='var(--primary)';});
    dropZone.addEventListener('dragleave',()=>{dropZone.style.borderColor='rgba(255,255,255,.18)';});
    dropZone.addEventListener('drop',e=>{
      e.preventDefault();dropZone.style.borderColor='rgba(255,255,255,.18)';
      handleImageFile(e.dataTransfer.files[0]);
    });
    fi.addEventListener('change',e=>{handleImageFile(e.target.files[0]);});
    body.appendChild(dropZone);

    // زر اختيار من الجهاز
    const pickBtn=el('button',{className:'btn-out',style:{width:'100%',marginTop:6,justifyContent:'center',gap:8},onClick:()=>fi.click()},
      '⬆️  اختر صورة من جهازك'
    );
    body.appendChild(pickBtn);

    // ── اسم المنتج ──
    body.appendChild(el('div',null,
      lbl('اسم المنتج'),
      inp({value:f.name,placeholder:'',onInput:e=>f.name=e.target.value})
    ));

    // ── الفئة ──
    const cats=(S.settings.categories||[]);
    const catOpts=cats.length?cats.map(c=>[c,c]):[['ملابس_أطفال','ملابس_أطفال'],['ملابس_نساء','ملابس_نساء'],['ملابس_رجال','ملابس_رجال'],['إكسسوارات','إكسسوارات']];
    body.appendChild(el('div',null,
      lbl('الفئة'),
      sel(f.category,[['','اختر الفئة...']]  .concat(catOpts),e=>f.category=e.target.value)
    ));

    // ── الموسم ──
    body.appendChild(el('div',null,
      lbl('الموسم'),
      sel(f.season,[['غير محدد','غير محدد'],['شتوي','شتوي ❄️'],['ربيعي','ربيعي 🌸'],['صيفي','صيفي ☀️'],['خريفي','خريفي 🍂']],e=>f.season=e.target.value)
    ));

    // ── سعر الشراء + سعر البيع ──
    body.appendChild(el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
      el('div',null,lbl('سعر الشراء'),inp({type:'number',value:f.buy_price,min:0,placeholder:'0',onInput:e=>f.buy_price=e.target.value})),
      el('div',null,lbl('سعر البيع'),inp({type:'number',value:f.sell_price,min:0,placeholder:'0',onInput:e=>f.sell_price=e.target.value}))
    ));

    // ── الكمية الحالية + الحد الأدنى ──
    body.appendChild(el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
      el('div',null,lbl('الكمية الحالية'),inp({type:'number',value:f.stock,min:0,placeholder:'0',onInput:e=>f.stock=e.target.value})),
      el('div',null,lbl('الحد الأدنى للتنبيه'),inp({type:'number',value:f.min_stock,min:0,placeholder:'0',onInput:e=>f.min_stock=e.target.value}))
    ));

    // ── أزرار الحفظ / الإلغاء ──
    body.appendChild(el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:4}},
      el('button',{className:'btn-out',style:{justifyContent:'center'},onClick:()=>am&&am.remove()},'إلغاء'),
      el('button',{className:'btn',style:{justifyContent:'center'},onClick:async()=>{
        if(!f.name)return alert('يرجى إدخال اسم المنتج');
        const dd={
          name:f.name,
          category:f.category,
          season:f.season,
          buy_price:Number(f.buy_price||0),
          sell_price:Number(f.sell_price||0),
          stock:Number(f.stock||0),
          min_stock:Number(f.min_stock||0),
          image:f.image||null,
          added_date: ie ? (prod.added_date||toDay()) : toDay(),
        };
        try{
          if(ie){
            await db.set('products',prod.id,dd);
            S.products=S.products.map(p=>p.id===prod.id?{...p,...dd}:p);
          } else {
            const res=await db.add('products',dd);
            // db.add returns a single object
            if(res&&res.id)S.products=[...S.products,res];
            else{const r2=await db.list('products');if(r2&&r2.length)S.products=r2;}
          }
          setState({syncSt:'synced'});
          if(am)am.remove();rT();toast(ie?'✅ تم تعديل المنتج':'✅ تم إضافة المنتج');
        }catch(err){
          console.error('Product save error:',err);
          setState({syncSt:'error'});
          toast('❌ خطأ: '+err.message,'err');
        }
      }},ie?'💾 حفظ التعديلات':'حفظ المنتج')
    ));

    am=modal(ie?'تعديل المنتج':'إضافة منتج جديد',body,()=>am&&am.remove(),480);
  };
  return d;
};

    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});

  lcCard.appendChild(btnsRow);

  // تنبيه أسفل البطاقة
